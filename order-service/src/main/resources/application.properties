# ─── App ───────────────────────────────────────────────────────
spring.application.name=order-service
server.port=8080

# ─── PostgreSQL ─────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://postgres:5432/orderdb
spring.datasource.username=orderuser
spring.datasource.password=orderpass
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── Kafka ──────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ─── Actuator & Prometheus ───────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ─── Logging (structured for log aggregators like Loki/ELK) ─────
logging.level.com.example.orderservice=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
